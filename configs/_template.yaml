# AutoResearch configuration template.
# Copy this file and fill in your research topic.

research:
  topic: "Your research question here"
  goal: >
    What the final output should look like and who it is for.

  dimensions:
    - "First dimension to explore"
    - "Second dimension to explore"
    # Add as many as needed. The agent will also discover new ones.

  scoring:
    min_dimensions_per_iteration: 1
    target_dimensions_total: 10
    evidence_types:
      - comparison_table
      - pricing_data
      - code_example
      - architecture_diagram_description
      - trade_off_analysis

  execution:
    max_iterations: 0       # 0 = infinite
    compress_every: 5       # compress knowledge base every N iterations
    allowed_tools: "WebSearch,WebFetch,Read,Bash,Glob,Grep"
    max_turns: 10           # max agent turns per research call
    timeout_seconds: 600    # timeout per invocation

    backend: claude         # "claude", "codex", "gemini", or "copilot"
    model: sonnet           # model name (backend-specific, see below)

    # ---------------------------------------------------------------
    # Multi-backend strategies (optional — omit for single-backend)
    # ---------------------------------------------------------------
    # strategy: ensemble     # single | ensemble | adversarial | parallel | serial | specialist
    # backends:
    #   primary: claude      # hypothesis + synthesis (best reasoner)
    #   research:            # execution phase backends (independent replication)
    #     - codex
    #     - gemini
    #   judge: claude        # scoring (must differ from research — blind review)
    #   utility: gemini      # compression (cheapest available)
    # strategy_config:
    #   merge_mode: best     # best (pick highest score) | union (merge all passing)
    #   merge_threshold: 40.0
    #   stagger_seconds: 5   # delay between parallel backend launches
    #   critique_depth: standard  # light | standard | thorough (adversarial only)
    #   refiner_sees_draft: true  # serial only

    # ---------------------------------------------------------------
    # Available models per backend
    # ---------------------------------------------------------------
    #
    # claude (Anthropic Claude Code CLI):
    #   Top:         opus          (claude-opus-4.6)
    #   Recommended: sonnet        (claude-sonnet-4.6) <-- default
    #   Budget:      haiku         (claude-haiku-4.5)
    #
    # codex (OpenAI Codex CLI):
    #   Top:         gpt-5.4
    #   Recommended: gpt-5.4-mini
    #   Coding:      gpt-5.3-codex
    #
    # gemini (Google Gemini CLI):
    #   Top:         gemini-3.1-pro-preview
    #   Recommended: gemini-3-flash-preview
    #   Previous:    gemini-2.5-pro
    #
    # copilot (GitHub Copilot CLI — supports multiple providers):
    #   OpenAI:      gpt-5.4 / gpt-5.4-mini
    #   Anthropic:   claude-opus-4.6 / claude-sonnet-4.6
    #   Google:      gemini-3.1-pro / gemini-3-flash
    # ---------------------------------------------------------------
