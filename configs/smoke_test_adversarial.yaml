# Smoke test for adversarial strategy.
# Codex researches, claude critiques, codex adjudicates.
# Three-way separation: researcher != critic != judge.

research:
  topic: "What are three pros and cons of Python?"
  goal: "A bullet-point list in under 100 words"

  dimensions:
    - "Developer experience"

  scoring:
    min_dimensions_per_iteration: 1
    target_dimensions_total: 1
    evidence_types:
      - trade_off_analysis

  execution:
    max_iterations: 1
    compress_every: 99
    allowed_tools: ""
    max_turns: 2
    backend: claude
    model: sonnet
    max_budget_per_call: 1.00
    timeout_seconds: 300

    strategy: adversarial
    backends:
      primary: claude         # hypothesis + synthesis
      research:
        - codex              # researcher
        - claude             # adversary (critique)
      judge: codex           # adjudicator (different from critic)
      utility: codex
    strategy_config:
      critique_depth: standard
