# Smoke test for ensemble strategy.
# Claude + codex research independently, claude judges blindly.
# Codex never touches hypothesis/judge — different provider for blind review.

research:
  topic: "What are three pros and cons of Python?"
  goal: "A bullet-point list in under 100 words"

  dimensions:
    - "Developer experience"

  scoring:
    min_dimensions_per_iteration: 1
    target_dimensions_total: 1
    evidence_types:
      - trade_off_analysis

  execution:
    max_iterations: 1
    compress_every: 99
    allowed_tools: ""
    max_turns: 2
    backend: claude
    model: sonnet
    max_budget_per_call: 1.00
    timeout_seconds: 300
    lightweight_mode: true

    strategy: ensemble
    backends:
      primary: claude         # hypothesis + synthesis
      research:
        - codex              # researcher 1 (different provider)
        - claude             # researcher 2
      judge: codex           # blind review (didn't do hypothesis)
      utility: codex
    strategy_config:
      merge_mode: best
      stagger_seconds: 5
