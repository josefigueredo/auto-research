# Minimal config for testing backends.
# Runs 1 iteration on a trivial topic to verify the loop works end-to-end.
#
# Usage:
#   uv run python -m src.cli --config configs/smoke_test.yaml --backend claude
#   uv run python -m src.cli --config configs/smoke_test.yaml --backend codex
#   uv run python -m src.cli --config configs/smoke_test.yaml --backend gemini
#   uv run python -m src.cli --config configs/smoke_test.yaml --backend copilot

research:
  topic: "Compare Python and Go for CLI tools"
  goal: "A short comparison in under 300 words"

  dimensions:
    - "Language ergonomics and developer experience"
    - "Binary distribution and startup time"

  scoring:
    min_dimensions_per_iteration: 1
    target_dimensions_total: 2
    evidence_types:
      - comparison_table
      - trade_off_analysis

  execution:
    max_iterations: 1
    compress_every: 99
    allowed_tools: "WebSearch,WebFetch,Read"
    max_turns: 5
    backend: claude
    model: sonnet
    max_budget_per_call: 0.25
    timeout_seconds: 120
